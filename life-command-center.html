<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Triage">
<meta name="theme-color" content="#1C1C1E">
<title>Life Triage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F2F2F7;--card:#FFFFFF;--card2:#F2F2F7;--label:#000;--label2:rgba(60,60,67,.85);--label3:rgba(60,60,67,.6);--label4:rgba(60,60,67,.3);
  --sep:rgba(60,60,67,.12);--sep2:#C6C6C8;--fill:rgba(120,120,128,.12);--fill2:rgba(120,120,128,.08);
  --blue:#007AFF;--green:#34C759;--red:#FF3B30;--orange:#FF9500;--yellow:#FFCC00;--purple:#AF52DE;--teal:#30B0C7;--indigo:#5856D6;
  --hbg:rgba(28,28,30,.95);--sat:env(safe-area-inset-top,44px);--sab:env(safe-area-inset-bottom,34px)
}
html,body{height:100%;overflow:hidden;background:#1C1C1E}
body{font-family:-apple-system,'Inter',BlinkMacSystemFont,sans-serif;color:var(--label);-webkit-font-smoothing:antialiased}
button,select,textarea,input{font-family:inherit}

/* ── Shell ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg)}

/* ── Header ── */
#header{background:var(--hbg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid rgba(255,255,255,.08);padding-top:calc(var(--sat) + 8px);flex-shrink:0;z-index:100;position:relative}
#header-top{display:flex;align-items:center;justify-content:space-between;padding:0 20px 8px}
#header-eyebrow{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue)}
#header-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1}
#header-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
#add-btn{width:36px;height:36px;border-radius:50%;background:var(--blue);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,122,255,.45);flex-shrink:0;transition:transform .1s,opacity .1s}
#add-btn:active{transform:scale(.92);opacity:.85}
#stats{display:flex;gap:0;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none}
#stats::-webkit-scrollbar{display:none}
.stat-pill{display:flex;flex-direction:column;align-items:center;padding:4px 14px;flex-shrink:0;position:relative}
.stat-pill+.stat-pill::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:.5px;background:rgba(255,255,255,.15)}
.stat-val{font-size:17px;font-weight:700;color:#fff}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;font-weight:500}
#tabbar{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;gap:0}
#tabbar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 14px 10px;border:none;background:transparent;color:rgba(255,255,255,.4);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;letter-spacing:-.1px}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--orange);color:#fff;border-radius:8px;padding:1px 5px;font-size:10px;margin-left:4px;font-weight:700}

/* ── Content ── */
#content{flex:1;overflow-y:auto;background:var(--bg);padding:16px 16px calc(var(--sab) + 70px);-webkit-overflow-scrolling:touch}

/* ── Task Card ── */
.task-card{background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:3px solid transparent;transition:opacity .2s}
.task-card.done{opacity:.5;border-left-color:var(--green)!important}
.task-card.pinned{box-shadow:0 0 0 2px rgba(255,204,0,.4),0 2px 8px rgba(0,0,0,.08)}
.task-inner{padding:12px 14px}
.task-row{display:flex;gap:10px;align-items:flex-start}
.check-btn{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:2px solid var(--sep2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s cubic-bezier(.34,1.56,.64,1);margin-top:1px}
.check-btn.checked{background:var(--green);border-color:var(--green)}
.check-btn.checked::after{content:'';display:block;width:6px;height:10px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.task-text{flex:1;font-size:15px;line-height:1.45;color:var(--label);font-weight:400;letter-spacing:-.1px}
.task-text.done-text{text-decoration:line-through;color:var(--label3)}
.star-btn{background:none;border:none;cursor:pointer;color:var(--label4);flex-shrink:0;padding:2px;font-size:20px;line-height:1;transition:color .15s,transform .1s}
.star-btn:active{transform:scale(.85)}
.star-btn.starred{color:var(--yellow)}
.cat-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:600;color:#fff;border-radius:6px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.task-meta{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center;padding-top:10px;border-top:.5px solid var(--sep)}
.meta-select{border:none;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none}
.time-pill{font-size:11px;background:var(--fill);color:var(--label3);border-radius:8px;padding:4px 9px;font-weight:500}
.note-text{font-size:11px;color:var(--label3);font-style:italic;line-height:1.4}

/* ── Drag handle for queue ── */
.drag-handle{flex-shrink:0;color:var(--label4);font-size:18px;cursor:grab;padding:2px 4px;touch-action:none;line-height:1;margin-top:1px}
.drag-handle:active{cursor:grabbing}
.ord-num{flex-shrink:0;width:22px;font-size:13px;font-weight:700;color:var(--label3);text-align:right;margin-top:3px}
.task-card.dragging{opacity:.4;transform:scale(.98)}
.task-card.drag-over{border-top:2px solid var(--blue)}

/* ── Group collapsible ── */
.group-wrap{margin-bottom:10px}
.group-header{width:100%;display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--card);border:none;border-radius:14px;cursor:pointer;text-align:left;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:border-radius .15s}
.group-header.open{border-radius:14px 14px 0 0}
.group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.group-title{font-weight:600;font-size:15px;flex:1;color:var(--label)}
.group-meta{font-size:12px;color:var(--label3)}
.group-chv{width:20px;height:20px;border-radius:50%;background:var(--fill);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--label3);flex-shrink:0;transition:transform .2s}
.group-header.open .group-chv{transform:rotate(180deg)}
.group-body{background:var(--card2);border-radius:0 0 14px 14px;padding:8px 8px 4px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.group-body .task-card{border-radius:10px}
.group-body .task-card:last-child{margin-bottom:0}

/* ── Filters ── */
.search-wrap{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:0 14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.search-input{flex:1;border:none;outline:none;font-size:15px;background:transparent;color:var(--label);padding:11px 0}
.search-input::placeholder{color:var(--label3)}
.filters{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-select{padding:9px 14px;border:none;border-radius:12px;font-size:13px;font-weight:500;background:var(--card);flex-shrink:0;outline:none;color:var(--label);-webkit-appearance:none;appearance:none;box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* ── Queue banner ── */
.queue-banner{background:linear-gradient(135deg,rgba(255,204,0,.15),rgba(255,149,0,.1));border:1px solid rgba(255,204,0,.3);border-radius:14px;padding:13px 16px;margin-bottom:14px;font-size:14px;color:#92400E;font-weight:500;line-height:1.4}
.completed-toggle{width:100%;text-align:left;padding:13px 16px;background:var(--card);border:none;border-radius:14px;cursor:pointer;font-size:15px;color:var(--green);font-weight:600;margin-top:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between}

/* ── CAL SPLIT VIEW ── */
.cal-split{display:flex;gap:14px;height:calc(100vh - 200px);min-height:500px}
.cal-left{width:38%;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.cal-left-header{flex-shrink:0;margin-bottom:10px}
.cal-left-label{font-size:11px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.cal-left-filters{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.cal-filter-sel{padding:7px 10px;border:none;border-radius:10px;font-size:12px;font-weight:500;background:var(--card);outline:none;color:var(--label);-webkit-appearance:none;appearance:none;box-shadow:0 1px 2px rgba(0,0,0,.06);width:100%}
.cal-chips-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cal-chips-scroll::-webkit-scrollbar{display:none}
.cal-chips-inner{display:flex;flex-direction:column;gap:6px}
.cal-chip{padding:8px 12px;border-radius:10px;font-size:12px;cursor:pointer;border:1.5px solid transparent;font-weight:500;line-height:1.4;transition:all .12s;user-select:none}
.cal-chip.tapping{border-color:var(--blue)!important;background:rgba(0,122,255,.12)!important;color:var(--blue)!important;font-weight:700}
.cal-chip.scheduled{opacity:.45}
.cal-right{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── Week grid ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-day{background:var(--card);border-radius:12px;padding:10px 7px;border:1.5px solid var(--sep);min-height:140px;transition:border-color .15s,background .15s;box-shadow:0 1px 2px rgba(0,0,0,.04);cursor:pointer}
.week-day.today{background:rgba(0,122,255,.06);border-color:var(--blue)}
.week-day.tap-target{border-color:var(--blue);background:rgba(0,122,255,.08)}
.week-day.selected{border-color:var(--blue);border-width:2px;background:rgba(0,122,255,.06)}
.week-day-name{font-size:10px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.week-day-date{font-size:16px;font-weight:600;color:var(--label);margin-bottom:6px;line-height:1}
.week-day.today .week-day-date{color:#fff;background:var(--blue);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px}
.cal-task-chip{font-size:10px;border-radius:6px;padding:3px 6px;margin-bottom:3px;line-height:1.3;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:500}
.day-actions{display:flex;gap:5px;margin-top:6px}
.day-action-btn{flex:1;padding:5px 4px;border-radius:8px;border:none;font-size:10px;font-weight:600;cursor:pointer;transition:opacity .15s}
.day-btn-planner{background:rgba(0,122,255,.12);color:var(--blue)}
.day-btn-planner:active{opacity:.7}

/* ── Month grid ── */
.month-hdr-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.month-day-hdr{font-size:11px;font-weight:600;color:var(--label3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.3px}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.month-day{background:var(--card);border-radius:10px;padding:5px;min-height:80px;border:1px solid var(--sep);box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;transition:border-color .15s}
.month-day.out-month{opacity:.3;background:transparent;box-shadow:none}
.month-day.today{border-color:var(--blue);background:rgba(0,122,255,.05)}
.month-day.tap-target{border-color:var(--blue);background:rgba(0,122,255,.04)}
.month-day.selected{border-color:var(--blue);border-width:2px}
.month-day-num{font-size:13px;font-weight:500;color:var(--label);margin-bottom:3px;line-height:1}
.month-day.today .month-day-num{color:#fff;background:var(--blue);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.month-task-bar{font-size:9px;color:#fff;border-radius:4px;padding:2px 5px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;font-weight:500}
.hint-text{font-size:11px;color:var(--label3);margin-top:10px;text-align:center}

/* ── Day detail panel ── */
/* ── Day Panel ── */
#day-panel{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
#day-panel.open{display:flex}
.day-panel-nav{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat) + 14px) 20px 14px;background:rgba(242,242,247,.94);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep2);flex-shrink:0}
.day-panel-back{font-size:17px;color:var(--blue);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px}
.day-panel-title{font-size:17px;font-weight:600;color:var(--label)}
.day-panel-body{flex:1;overflow-y:auto;padding:0;-webkit-overflow-scrolling:touch}
.section-label{font-size:12px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.5px;margin:16px 16px 8px}

/* ── Timeline Planner ── */
.planner-layout{display:flex;height:100%}
.planner-sidebar{width:52px;flex-shrink:0;position:relative;background:var(--bg)}
.planner-hour-label{position:absolute;right:8px;font-size:10px;font-weight:500;color:var(--label3);transform:translateY(-50%);white-space:nowrap}
.planner-main{flex:1;position:relative;overflow:hidden}
.planner-hour-line{position:absolute;left:0;right:0;height:.5px;background:var(--sep2)}
.planner-now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10}
.planner-now-dot{position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red)}
.routine-block-abs{position:absolute;left:4px;right:4px;border-radius:10px;overflow:hidden;cursor:default;user-select:none;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.routine-block-inner{padding:5px 8px;height:100%}
.routine-block-time{font-size:10px;font-weight:600;color:inherit;opacity:.7;white-space:nowrap;overflow:hidden}
.routine-block-label{font-size:12px;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.routine-block-edit{font-size:10px;font-weight:500;opacity:.6;text-decoration:underline;cursor:pointer;background:none;border:none;color:inherit;padding:0;margin-top:2px}
.task-block-abs{position:absolute;left:4px;right:4px;border-radius:10px;overflow:hidden;z-index:5;touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.task-block-inner{padding:5px 8px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.task-block-text{font-size:12px;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex:1}
.task-block-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.task-block-time{font-size:10px;font-weight:500;opacity:.75}
.task-block-done-btn{font-size:11px;font-weight:700;background:rgba(255,255,255,.25);border:none;border-radius:6px;padding:2px 7px;cursor:pointer;color:inherit}
.task-block-done-btn.done-state{background:rgba(52,199,89,.3);color:#fff}
.task-block-remove{font-size:14px;opacity:.5;cursor:pointer;background:none;border:none;color:inherit;padding:0 2px}
.drop-zone-abs{position:absolute;left:4px;right:4px;border:2px dashed var(--sep2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--label3);font-weight:500;transition:border-color .15s,background .15s;cursor:pointer;z-index:3}
.drop-zone-abs.highlight{border-color:var(--blue);background:rgba(0,122,255,.06);color:var(--blue)}
.resize-handle{position:absolute;bottom:0;left:0;right:0;height:14px;cursor:ns-resize;display:flex;align-items:center;justify-content:center;touch-action:none}
.resize-handle::after{content:'';width:24px;height:3px;background:rgba(255,255,255,.4);border-radius:2px}
.planner-unscheduled{padding:12px 16px;border-top:.5px solid var(--sep2);background:var(--bg);flex-shrink:0}
.unscheduled-label{font-size:11px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.unscheduled-chips{display:flex;flex-wrap:wrap;gap:6px}
.unsched-chip{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .12s;touch-action:none;user-select:none}
.unsched-chip.dragging-touch{opacity:.4;transform:scale(.95)}
.touch-ghost{position:fixed;pointer-events:none;z-index:9999;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;opacity:.9;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:none}

/* ── Notes ── */
.note-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:transform .1s}
.note-card:active{transform:scale(.99)}
.note-card-title{font-size:16px;font-weight:600;color:var(--label);margin-bottom:3px}
.note-card-meta{font-size:12px;color:var(--label3);margin-bottom:6px}
.note-card-preview{font-size:13px;color:var(--label2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.folder-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border-radius:14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.folder-icon{font-size:20px;flex-shrink:0}
.folder-name{font-size:16px;font-weight:600;color:var(--label);flex:1}
.folder-count{font-size:13px;color:var(--label3)}
#note-detail{position:fixed;inset:0;z-index:600;background:var(--bg);display:none;flex-direction:column}
#note-detail.open{display:flex}
.note-detail-nav{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat) + 14px) 20px 14px;background:rgba(242,242,247,.94);backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep2);flex-shrink:0}
.note-detail-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.note-title-input{width:100%;font-size:22px;font-weight:700;border:none;outline:none;background:transparent;color:var(--label);margin-bottom:8px;letter-spacing:-.3px}
.note-meta-line{font-size:12px;color:var(--label3);margin-bottom:14px}
.note-textarea{width:100%;font-size:16px;line-height:1.65;border:none;outline:none;background:transparent;color:var(--label);resize:none;min-height:300px}
.extract-btn{width:100%;padding:14px;font-size:15px;font-weight:600;border:none;border-radius:14px;background:var(--blue);color:#fff;cursor:pointer;margin-top:14px;transition:opacity .15s}
.extract-btn:active{opacity:.8}
.extract-btn:disabled{background:var(--fill);color:var(--label3);cursor:default}
.extracted-task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--card);border-radius:10px;margin-bottom:6px}
.ext-check{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:2px solid var(--sep2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ext-check.on{background:var(--blue);border-color:var(--blue)}
.ext-check.on::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.ext-text{flex:1;font-size:14px;color:var(--label);line-height:1.4}

/* ── Modal ── */
#modal-overlay{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;background:var(--bg)}
#modal-overlay.visible{display:flex}
.modal-nav{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat) + 14px) 20px 14px;background:rgba(242,242,247,.94);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep2);flex-shrink:0}
.modal-cancel{font-size:17px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:400;padding:4px 0}
.modal-nav-title{font-size:17px;font-weight:600;color:var(--label);letter-spacing:-.2px}

function getWeekDates(){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+(weekOffset*7));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function getMonthDates(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0),days=[];
  const sp=(first.getDay()+6)%7;
  for(let i=sp;i>0;i--){const d=new Date(first);d.setDate(d.getDate()-i);days.push({date:d,inMonth:false});}
  for(let i=1;i<=last.getDate();i++)days.push({date:new Date(y,m,i),inMonth:true});
  const ep=7-(days.length%7||7);
  for(let i=1;i<=ep;i++){const d=new Date(last);d.setDate(last.getDate()+i);days.push({date:d,inMonth:false});}
  return days;
}

function cardHTML(t,showDrag=false){

  return `<div class="task-card${t.done?' done':''}${t.pinned?' pinned':''}" style="border-left-color:${t.done?'#34C759':p.color||'transparent'}" id="tc${t.id}">
  <div class="task-inner">
    <div class="task-row">
      ${showDrag?`<span class="drag-handle" data-qdrag="${t.id}" title="Drag to reorder">⠿</span>`:''}
      <button class="check-btn${t.done?' checked':''}" onclick="toggleDone(${t.id})"></button>
      <span class="task-text${t.done?' done-text':''}">${esc(t.text)}</span>
      <button class="star-btn${t.pinned?' starred':''}" onclick="togglePin(${t.id})">${t.pinned?'★':'☆'}</button>

      <span class="cat-tag" style="background:${cc}">${esc(t.cat)}</span>

        ${PRIORITIES.map(pr=>`<option value="${pr.key}"${t.priority===pr.key?' selected':''}>${pr.label}</option>`).join('')}
      </select>
      <select class="meta-select" style="background:${db};color:${dc}" onchange="updateTask(${t.id},'delegate',this.value)">
        ${DELEGATES.map(d=>`<option value="${d.key}"${t.delegate===d.key?' selected':''}>${d.label}</option>`).join('')}
      </select>
      <span class="time-pill">⏱ ${ft(t.mins)}</span>
      ${t.notes?`<span class="note-text">${esc(t.notes)}</span>`:''}
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════════════
// UNIFIED TOUCH + MOUSE DRAG SYSTEM
// Works for: Queue reorder, Cal chip→day, Planner chip→timeline
// ═══════════════════════════════════════════════════════════════
let uDrag = {
  active: false,
  type: null,      // 'queue' | 'cal' | 'planner'
  taskId: null,
  srcEl: null,
  ghost: null,
  qSrc: null,      // queue: source task id
  qOverId: null,   // queue: target task id
};

function uGhostCreate(text, color, bg, x, y){
  const g = document.createElement('div');
  g.className = 'touch-ghost';
  g.style.cssText = `left:${x-20}px;top:${y-16}px;background:${bg};color:${color};max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis`;
  g.textContent = text;
  document.body.appendChild(g);
  return g;
}

function uGhostMove(x, y){
  if(uDrag.ghost){ uDrag.ghost.style.left=`${x-20}px`; uDrag.ghost.style.top=`${y-16}px`; }
}

function uGhostRemove(){
  if(uDrag.ghost){ uDrag.ghost.remove(); uDrag.ghost=null; }
}

function uHighlightAt(x, y, selector, cls){
  document.querySelectorAll('.'+cls).forEach(el=>el.classList.remove(cls));
  const el = document.elementFromPoint(x,y)?.closest(selector);
  if(el) el.classList.add(cls);
  return el;
}

// ── Queue drag (⠿ handle) ────────────────────────────────────
function initQueueTouchDrag(){
  // Called after renderContent when Queue tab is active
  document.querySelectorAll('[data-qdrag]').forEach(handle=>{
    handle.addEventListener('mousedown', e=>qMouseStart(e, parseInt(handle.dataset.qdrag)), {passive:false});
    handle.addEventListener('touchstart', e=>qTouchStart(e, parseInt(handle.dataset.qdrag)), {passive:false});
  });
}

function qStart(taskId, x, y){
  uDrag.active=true; uDrag.type='queue'; uDrag.taskId=taskId; uDrag.qSrc=taskId; uDrag.qOverId=null;
  const t=S.todos.find(x=>x.id===taskId);
  const p=pi(t?t.priority:'');
  uDrag.ghost=uGhostCreate(t?t.text.slice(0,40)+'…':'Task', p.color||'#007AFF', p.bg||'rgba(0,122,255,.1)', x, y);
  document.getElementById('tc'+taskId)?.classList.add('dragging');
}

function qMove(x, y){
  uGhostMove(x,y);
  // Find card under finger
  uDrag.ghost.style.display='none';
  const el=document.elementFromPoint(x,y)?.closest('.task-card');
  uDrag.ghost.style.display='';
  document.querySelectorAll('.task-card.drag-over').forEach(e=>e.classList.remove('drag-over'));
  if(el && el.id.startsWith('tc')){
    const overId=parseInt(el.id.slice(2));
    if(overId!==uDrag.qSrc){ el.classList.add('drag-over'); uDrag.qOverId=overId; }
    else uDrag.qOverId=null;
  } else uDrag.qOverId=null;
}

function qEnd(){
  uGhostRemove();
  document.querySelectorAll('.task-card.dragging,.task-card.drag-over').forEach(e=>{e.classList.remove('dragging','drag-over');});
  if(uDrag.qSrc!==null && uDrag.qOverId!==null){
    const pinned=S.todos.filter(t=>!t.done&&t.pinned).sort((a,b)=>a.qorder-b.qorder);
    const si=pinned.findIndex(t=>t.id===uDrag.qSrc), ti=pinned.findIndex(t=>t.id===uDrag.qOverId);
    if(si>=0&&ti>=0){ pinned.splice(ti,0,pinned.splice(si,1)[0]); pinned.forEach((t,i)=>{const x=S.todos.find(x=>x.id===t.id);if(x)x.qorder=i;}); save(); renderContent(); }
  }
  uDrag={active:false,type:null,taskId:null,srcEl:null,ghost:null,qSrc:null,qOverId:null};
}

function qMouseStart(e, id){ e.preventDefault(); qStart(id,e.clientX,e.clientY); document.addEventListener('mousemove',qMouseMove); document.addEventListener('mouseup',qMouseEnd); }
function qMouseMove(e){ if(uDrag.type==='queue') qMove(e.clientX,e.clientY); }
function qMouseEnd(e){ document.removeEventListener('mousemove',qMouseMove); document.removeEventListener('mouseup',qMouseEnd); if(uDrag.type==='queue') qEnd(); }
function qTouchStart(e, id){ e.preventDefault(); const t=e.touches[0]; qStart(id,t.clientX,t.clientY); document.addEventListener('touchmove',qTouchMove,{passive:false}); document.addEventListener('touchend',qTouchEnd); }
function qTouchMove(e){ e.preventDefault(); if(uDrag.type==='queue'&&e.touches.length) qMove(e.touches[0].clientX,e.touches[0].clientY); }
function qTouchEnd(e){ document.removeEventListener('touchmove',qTouchMove); document.removeEventListener('touchend',qTouchEnd); if(uDrag.type==='queue') qEnd(); }

// ── Cal chip → day drag ──────────────────────────────────────
function initCalTouchDrag(){
  document.querySelectorAll('[data-caldrag]').forEach(chip=>{
    chip.addEventListener('mousedown', e=>calMouseStart(e, chip), {passive:false});
    chip.addEventListener('touchstart', e=>calTouchStart(e, chip), {passive:false});
  });
}

function calDragStart(chip, x, y){
  const taskId=parseInt(chip.dataset.caldrag);
  const t=S.todos.find(x=>x.id===taskId);
  const p=pi(t?t.priority:'');
  uDrag.active=true; uDrag.type='cal'; uDrag.taskId=taskId;
  uDrag.ghost=uGhostCreate(t?t.text.slice(0,36)+'…':'Task', p.color||'#007AFF', p.bg||'rgba(0,122,255,.1)', x, y);
  chip.classList.add('dragging-touch');
}

function calDragMove(x, y){
  uGhostMove(x,y);
  uDrag.ghost.style.display='none';
  const el=document.elementFromPoint(x,y);
  uDrag.ghost.style.display='';
  document.querySelectorAll('.week-day.drag-over,.month-day.drag-over').forEach(e=>e.classList.remove('drag-over'));
  const day=el?.closest('.week-day,.month-day');
  if(day) day.classList.add('drag-over');
}

function calDragEnd(x, y){
  uGhostRemove();
  document.querySelectorAll('[data-caldrag]').forEach(c=>c.classList.remove('dragging-touch'));
  document.querySelectorAll('.week-day.drag-over,.month-day.drag-over').forEach(e=>e.classList.remove('drag-over'));
  // Find drop target
  let el;
  if(uDrag.ghost===null){ // ghost already removed, use last position
    el=document.elementFromPoint(x,y);
  } else el=document.elementFromPoint(x,y);
  const day=document.elementFromPoint(x,y)?.closest('[data-daykey]');
  if(day && uDrag.taskId){
    assignDay(uDrag.taskId, day.dataset.daykey);
    calSelectedDay=day.dataset.daykey;
    renderContent();
  } else if(uDrag.taskId){
    // fallback: check for any highlighted day
    renderContent();
  }
  uDrag={active:false,type:null,taskId:null,srcEl:null,ghost:null,qSrc:null,qOverId:null};
}

function calMouseStart(e,chip){ e.preventDefault(); calDragStart(chip,e.clientX,e.clientY); document.addEventListener('mousemove',calMouseMove); document.addEventListener('mouseup',calMouseEnd); }
function calMouseMove(e){ if(uDrag.type==='cal') calDragMove(e.clientX,e.clientY); }
function calMouseEnd(e){ document.removeEventListener('mousemove',calMouseMove); document.removeEventListener('mouseup',calMouseEnd); if(uDrag.type==='cal') calDragEnd(e.clientX,e.clientY); }
function calTouchStart(e,chip){ e.preventDefault(); const t=e.touches[0]; calDragStart(chip,t.clientX,t.clientY); document.addEventListener('touchmove',calTouchMove,{passive:false}); document.addEventListener('touchend',calTouchEnd); }
function calTouchMove(e){ e.preventDefault(); if(uDrag.type==='cal'&&e.touches.length) calDragMove(e.touches[0].clientX,e.touches[0].clientY); }
function calTouchEnd(e){ document.removeEventListener('touchmove',calTouchMove); document.removeEventListener('touchend',calTouchEnd); if(uDrag.type==='cal'&&e.changedTouches.length){ const t=e.changedTouches[0]; calDragEnd(t.clientX,t.clientY); } }

function renderQueue(){
  const pinned=S.todos.filter(t=>!t.done&&t.pinned).sort((a,b)=>a.qorder-b.qorder);
  const done=S.todos.filter(t=>t.done);
  let html='';
  if(!pinned.length){
    html=`<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">Queue is empty</div><div class="empty-sub">Tap ☆ on any task to add it to your priority queue.</div></div>`;
  }else{
    html=`<div class="queue-banner">⚡ <strong>${pinned.length} tasks</strong> in your priority queue · ${ft(tm(pinned))} estimated<br><span style="font-size:12px;opacity:.8">Drag ⠿ handle to reorder</span></div>`;
    html+=pinned.map((t,i)=>`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:var(--label3);padding-top:14px;min-width:20px;text-align:right">${i+1}</span>${cardHTML(t,true)}</div>`).join('');
  }
  if(done.length){
    html+=`<button class="completed-toggle" onclick="showCompletedQ=!showCompletedQ;renderContent()"><span>Completed (${done.length}) — tap to restore</span><span style="font-size:12px;opacity:.7">${showCompletedQ?'Hide ▴':'Show ▾'}</span></button>`;
    if(showCompletedQ)html+=`<div style="margin-top:8px">${done.map(t=>cardHTML(t)).join('')}</div>`;
  }
  return html;
}

// ── Calendar helpers ──────────────────────────────────────────
function calChipList(){
  const active=S.todos.filter(t=>{
    if(t.done)return false;
    if(calFilters.cat!=="All"&&t.cat!==calFilters.cat)return false;
    if(calFilters.priority==="queued"){if(!t.pinned)return false;}
    else if(calFilters.priority!=="all"&&t.priority!==calFilters.priority)return false;
    if(calFilters.delegate!=="all"&&t.delegate!==calFilters.delegate)return false;
    return true;
  });
  const aIds=new Set(Object.values(S.calMap).flat());
  // Sort
  const PORD={immediate:0,"next-month":1,"long-term":2};
  active.sort((a,b)=>{
    // always unscheduled first within sort group
    const aS=aIds.has(a.id)?1:0,bS=aIds.has(b.id)?1:0;
    if(calSort==="none") return aS-bS;
    let cmp=0;
    if(calSort==="cat") cmp=a.cat.localeCompare(b.cat);
    else if(calSort==="priority") cmp=(PORD[a.priority]??9)-(PORD[b.priority]??9);
    else if(calSort==="delegate") cmp=a.delegate.localeCompare(b.delegate);
    return cmp!==0?cmp:aS-bS;
  });
  return active;
}

// ── MAIN RENDER ──────────────────────────────────────────────
function renderHeader(){
  const active=S.todos.filter(t=>!t.done),done=S.todos.filter(t=>t.done),pinned=active.filter(t=>t.pinned),myImm=active.filter(t=>t.priority==="immediate"&&t.delegate==="matt");
  document.getElementById('header-sub').textContent=`${active.length} active · ${done.length} done`;
  document.getElementById('stats').innerHTML=[
    {label:"Immediate",val:ft(tm(myImm)),color:"#FF3B30"},
    {label:"Queued",val:pinned.length,color:"#FFCC00"},
    {label:"Delegated",val:active.filter(t=>t.delegate!=="matt").length,color:"#34C759"},
    {label:"Done",val:done.length,color:"#8E8E93"},
  ].map(s=>`<div class="stat-pill"><div class="stat-val" style="color:${s.color}">${s.val}</div><div class="stat-lbl">${s.label}</div></div>`).join('');
}

const TABS=[{label:"⚡ Queue"},{label:"All Tasks"},{label:"Category"},{label:"Priority"},{label:"Delegate"},{label:"Week"},{label:"Month"},{label:"Notes"},{label:"Routine"}];

function renderTabbar(){
  const pinned=S.todos.filter(t=>!t.done&&t.pinned).length;
  document.getElementById('tabbar').innerHTML=TABS.map((t,i)=>`<button class="tab-btn${activeTab===i?' active':''}" onclick="switchTab(${i})">${t.label}${i===0&&pinned?`<span class="badge">${pinned}</span>`:''}</button>`).join('');
}

function renderContent(){
  const active=S.todos.filter(t=>!t.done);
  let html='';
  if(activeTab===0)html=renderQueue();
  else if(activeTab===1)html=renderAll();
  else if(activeTab===2)html=renderByDim(CATS.map(c=>({title:c,items:active.filter(t=>t.cat===c),color:CC[c]||'#007AFF'})));
  else if(activeTab===3)html=renderByDim(PRIORITIES.map(p=>({title:p.label,items:active.filter(t=>t.priority===p.key),color:p.color,open:p.key==="immediate"})));
  else if(activeTab===4)html=renderByDim(DELEGATES.map(d=>({title:d.label,items:active.filter(t=>t.delegate===d.key),color:DC[d.key]||'#007AFF',open:d.key==="matt"})));
  else if(activeTab===5)html=renderWeek();
  else if(activeTab===6)html=renderMonth();
  else if(activeTab===7)html=renderNotes();
  else if(activeTab===8)html=renderRoutine();
  document.getElementById('content').innerHTML=html;
  // Init touch drag after DOM update
  setTimeout(()=>{
    if(activeTab===0)initQueueTouchDrag();
    if(activeTab===5||activeTab===6)initCalTouchDrag();
  },50);
}

function render(){renderHeader();renderTabbar();renderContent();}

// ═══════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════
function switchTab(i){activeTab=i;calTapMode=null;calSelectedDay=null;if(i!==5)weekOffset=0;render();}
function toggleGroup(id){
  const body=document.getElementById(id+'_body'),st=document.getElementById(id+'_st'),hdr=body.previousElementSibling,open=body.style.display==='none';
  body.style.display=open?'block':'none';st.value=open?'1':'0';hdr.classList.toggle('open',open);
}
function updateTask(id,field,value){const t=S.todos.find(t=>t.id===id);if(t){t[field]=value;save();renderHeader();renderTabbar();}}
function toggleDone(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;save();
  // If day panel is open, don't call full render (it would close it)
  if(document.getElementById('day-panel').classList.contains('open')){renderHeader();renderTabbar();return;}
  render();
}
function togglePin(id){const t=S.todos.find(t=>t.id===id);if(t){t.pinned=!t.pinned;save();render();}}

function calChipTap(id){
  // If a day is selected, assign this task to that day immediately
  if(calSelectedDay!==null){
    const alreadyAssigned=(S.calMap[calSelectedDay]||[]).includes(id);
    if(alreadyAssigned){
      unassign(id,calSelectedDay);
    } else {
      assignDay(id,calSelectedDay);
      renderContent();
    }
    return;
  }
  // Otherwise toggle chip selection for deferred day tap
  calTapMode=calTapMode===id?null:id;
  renderContent();
}

function calDayTap(key){

// TIMELINE PLANNER
// ═══════════════════════════════════════════════════════════════
const TL_START=6,TL_END=23,TL_HOURS=TL_END-TL_START; // 6am-11pm = 17 hours
const PX_PER_MIN=2.2; // px per minute of timeline
const TOTAL_PX=TL_HOURS*60*PX_PER_MIN;

function timeToMins(timeStr){
  // parse "6:15–6:30 AM" → returns {start, end} in minutes from midnight
  const clean=timeStr.replace(/–|-/g,'|').replace(/AM|PM/gi,'').trim();
  const parts=clean.split('|').map(s=>s.trim()).filter(Boolean);
  function parsePart(s,hint){
    const m=s.match(/(\d+):?(\d*)/);if(!m)return null;
    let h=parseInt(m[1]),mn=parseInt(m[2]||'0');
    const origStr=timeStr.toUpperCase();
    // determine AM/PM from original string
    if(origStr.includes('PM')&&h<12)h+=12;
    else if(origStr.includes('AM')&&h===12)h=0;
    else if(h<6)h+=12; // assume PM for afternoon hours without marker
    return h*60+mn;
  }
  if(parts.length>=2){const s=parsePart(parts[0]),e=parsePart(parts[1]);if(s!==null&&e!==null)return{start:s,end:e};}
  if(parts.length===1){const s=parsePart(parts[0]);if(s!==null)return{start:s,end:s+30};}
  return null;
}

function minsToY(mins){return(mins-TL_START*60)*PX_PER_MIN;}
function yToMins(y){return Math.round(y/PX_PER_MIN+TL_START*60);}
function minsToTimeStr(mins){const h=Math.floor(mins/60),m=mins%60,ampm=h>=12?'PM':'AM',hd=h>12?h-12:h===0?12:h;return`${hd}:${String(m).padStart(2,'0')} ${ampm}`;}

function openDayPanel(key){
  calSelectedDay=key;
  document.getElementById('day-panel-title').textContent=fmtDate(key);
  renderDayPanel(key);
  document.getElementById('day-panel').classList.add('open');
}
function closeDayPanel(){document.getElementById('day-panel').classList.remove('open');}

function getRoutineForDay(key){
  return (S.plannerData[key]&&S.plannerData[key].routine)||JSON.parse(JSON.stringify(S.routine));
}
function getPlannerItems(key){
  // items: [{taskId, startMins, durationMins}]
  return (S.plannerData[key]&&S.plannerData[key].items)||[];
}
function savePlannerItems(key,items){
  if(!S.plannerData[key])S.plannerData[key]={};
  S.plannerData[key].items=items;save();
}

function renderDayPanel(key){
  const body=document.getElementById('day-panel-body');
  const routine=getRoutineForDay(key);
  const items=getPlannerItems(key);
  const dayTasks=(S.calMap[key]||[]).map(id=>S.todos.find(t=>t.id===id)).filter(Boolean);
  const scheduledIds=new Set(items.map(i=>i.taskId));
  const unscheduled=dayTasks.filter(t=>!scheduledIds.has(t.id));
  const nowMins=new Date().getHours()*60+new Date().getMinutes();
  const isToday=key===todayK;

  // Build HTML
  let html=`<div style="display:flex;flex-direction:column;height:100%">
  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch">
  <div class="planner-layout" style="height:${TOTAL_PX+60}px">
    <div class="planner-sidebar" style="height:${TOTAL_PX+60}px">`;

  // Hour labels
  for(let h=TL_START;h<=TL_END;h++){
    const y=minsToY(h*60)+30;
    const label=h===0?'12 AM':h<12?`${h} AM`:h===12?'12 PM':h===TL_END?'':``+`${h-12} PM`;
    html+=`<div class="planner-hour-label" style="top:${y}px">${label}</div>`;
  }
  html+=`</div><div class="planner-main" id="planner-main-${key}" style="height:${TOTAL_PX+60}px;position:relative">`;
  html+=`<div style="position:absolute;top:0;left:0;right:0;height:30px"></div>`; // top padding

  // Hour grid lines
  for(let h=TL_START;h<=TL_END;h++){
    const y=minsToY(h*60)+30;
    html+=`<div class="planner-hour-line" style="top:${y}px"></div>`;
  }

  // Now line
  if(isToday&&nowMins>=TL_START*60&&nowMins<=TL_END*60){
    const y=minsToY(nowMins)+30;
    html+=`<div class="planner-now-line" style="top:${y}px"><div class="planner-now-dot"></div></div>`;
  }

  // Routine blocks
  routine.forEach((block,bi)=>{
    const t=timeToMins(block.time);if(!t)return;
    const y=minsToY(t.start)+30,h2=Math.max((t.end-t.start)*PX_PER_MIN,24);
    const isFree=!block.label||block.label.trim()==='';
    html+=`<div class="routine-block-abs" style="top:${y}px;height:${h2}px;background:${isFree?'rgba(120,120,128,.08)':'rgba(120,120,128,.15)'};color:var(--label2)">
      <div class="routine-block-inner">
        <div class="routine-block-time">${esc(block.time)}</div>
        <input class="routine-block-label" style="font-size:12px;font-weight:600;color:var(--label2);border:none;outline:none;background:transparent;width:100%;padding:0" value="${esc(block.label)}" onchange="updateRoutineBlock('${key}',${bi},this.value)" placeholder="Add label…">
      </div>
    </div>`;
  });

  // Compute gaps between routine blocks and task items for drop zones
  // Collect all occupied intervals
  const occupied=[];
  routine.forEach(block=>{const t=timeToMins(block.time);if(t)occupied.push({s:t.start,e:t.end,type:'routine'});});
  items.forEach(item=>{occupied.push({s:item.startMins,e:item.startMins+item.durationMins,type:'task',id:item.taskId});});
  occupied.sort((a,b)=>a.s-b.s);

  // Find gaps and render drop zones
  let cursor=TL_START*60;
  const gaps=[];
  for(const occ of occupied){
    if(occ.s>cursor+5)gaps.push({s:cursor,e:occ.s});
    cursor=Math.max(cursor,occ.e);
  }
  if(cursor<TL_END*60-5)gaps.push({s:cursor,e:TL_END*60});

  gaps.forEach((gap,gi)=>{
    const y=minsToY(gap.s)+30,h2=Math.max((gap.e-gap.s)*PX_PER_MIN,40);
    if(h2<20)return;
    html+=`<div class="drop-zone-abs" id="dz_${key}_${gi}" style="top:${y}px;height:${h2}px;flex-direction:column;gap:4px" 
      data-key="${key}" data-startmins="${gap.s}" data-endmins="${gap.e}"
      ondragover="event.preventDefault();this.classList.add('highlight')" 
      ondragleave="this.classList.remove('highlight')"
      ondrop="dropOnTimeline(event,'${key}',${gap.s})"
      onclick="openPlannerSheet('${key}',${gap.s},${gap.e})">
      <span style="font-size:12px;font-weight:600">${minsToTimeStr(gap.s)}</span>
      <span style="font-size:10px;opacity:.7">Tap to add · drag task here</span>
    </div>`;
  });

  // Task blocks
  items.forEach(item=>{
    const t2=S.todos.find(t=>t.id===item.taskId);if(!t2)return;
    const p=pi(t2.priority);
    const y=minsToY(item.startMins)+30,h3=Math.max(item.durationMins*PX_PER_MIN,44);
    const isDone=t2.done;
    html+=`<div class="task-block-abs" id="tb_${item.taskId}" style="top:${y}px;height:${h3}px;background:${isDone?'#34C759':p.color};color:#fff"
      data-taskid="${item.taskId}" data-key="${key}">
      <div class="task-block-inner">
        <div class="task-block-text">${esc(t2.text)}</div>
        <div class="task-block-bottom">
          <span class="task-block-time">${minsToTimeStr(item.startMins)} · ${ft(item.durationMins)}</span>
          <div style="display:flex;gap:4px;align-items:center">
            <button class="task-block-done-btn${isDone?' done-state':''}" onclick="toggleDoneFromPlanner('${key}',${item.taskId})">${isDone?'✓ Done':'Mark Done'}</button>
            <button class="task-block-remove" onclick="removeFromTimeline('${key}',${item.taskId})">✕</button>
          </div>
        </div>
      </div>
      <div class="resize-handle" data-taskid="${item.taskId}" data-key="${key}"></div>
    </div>`;
  });

  // Calendar event blocks
  const evts=(S.plannerData[key]&&S.plannerData[key].events)||[];
  evts.forEach(evt=>{
    const y=minsToY(evt.startMins)+30,h3=Math.max(evt.durationMins*PX_PER_MIN,36);
    html+=`<div class="task-block-abs" style="top:${y}px;height:${h3}px;background:${evt.color||'#007AFF'};color:#fff;left:40%;right:4px;cursor:pointer"
      onclick="openEventEdit('${key}','${evt.id}')">
      <div class="task-block-inner">
        <div class="task-block-text">📅 ${esc(evt.title)}</div>
        <div class="task-block-bottom">
          <span class="task-block-time">${minsToTimeStr(evt.startMins)} · ${ft(evt.durationMins)}</span>
          <button class="task-block-remove" onclick="event.stopPropagation();removePlannerEvent('${key}','${evt.id}')">✕</button>
        </div>
      </div>
    </div>`;
  });

  html+=`</div></div></div>`;

  // Unscheduled tasks tray at bottom
  html+=`<div class="planner-unscheduled">
    <div class="unscheduled-label">Tasks for this day — drag to timeline${unscheduled.length===0?' (all scheduled)':''}</div>
    <div class="unscheduled-chips" id="unsched-chips-${key}">
      ${unscheduled.map(t=>{const p=pi(t.priority);return `<div class="unsched-chip" data-taskid="${t.id}" data-key="${key}" draggable="true"
        style="background:${p.bg};color:${p.color};border-color:${p.color}30"
        ondragstart="timelineDragStart(event,${t.id})"
        ondragend="timelineDragEnd(event)">${esc(t.text.length>32?t.text.slice(0,32)+'…':t.text)}</div>`;}).join('')}
      ${dayTasks.length===0?`<span style="font-size:12px;color:var(--label3)">No tasks assigned to this day. Go to Week or Month view to assign tasks.</span>`:''}
    </div>
  </div>
  </div>`;

  body.innerHTML=html;
  initPlannerInteractions(key);
}

// Timeline interactions
let tlDragTaskId=null;
function timelineDragStart(e,taskId){tlDragTaskId=taskId;e.currentTarget.classList.add('dragging-touch');}
function timelineDragEnd(e){tlDragTaskId=null;document.querySelectorAll('.unsched-chip').forEach(el=>el.classList.remove('dragging-touch'));}

function dropOnTimeline(e,key,startMins){
  e.preventDefault();e.currentTarget.classList.remove('highlight');
  const taskId=tlDragTaskId||touchDragTaskId;
  if(!taskId)return;
  const t=S.todos.find(x=>x.id===taskId);if(!t)return;
  const items=getPlannerItems(key).filter(i=>i.taskId!==taskId);
  items.push({taskId,startMins,durationMins:Math.min(t.mins>=999?60:t.mins,120)});
  savePlannerItems(key,items);
  touchDragTaskId=null;tlDragTaskId=null;
  renderDayPanel(key);
}

function removeFromTimeline(key,taskId){
  const items=getPlannerItems(key).filter(i=>i.taskId!==taskId);
  savePlannerItems(key,items);
  renderHeader();renderTabbar();renderDayPanel(key);
}

function removePlannerEvent(key,evtId){
  if(!S.plannerData[key]||!S.plannerData[key].events)return;
  S.plannerData[key].events=S.plannerData[key].events.filter(e=>e.id!==evtId);
  save();renderHeader();renderTabbar();renderDayPanel(key);
}

function toggleDoneFromPlanner(key,taskId){
  const t=S.todos.find(x=>x.id===taskId);
  if(!t)return;
  t.done=!t.done;
  save();
  renderHeader();
  renderTabbar();
  renderDayPanel(key);
}

function updateRoutineBlock(key,idx,value){
  if(!S.plannerData[key])S.plannerData[key]={};
  if(!S.plannerData[key].routine)S.plannerData[key].routine=JSON.parse(JSON.stringify(S.routine));
  S.plannerData[key].routine[idx].label=value;save();
}

// ── Touch drag for iPad ──────────────────────────────────────
let touchDragTaskId=null,touchGhost=null,touchDragKey=null;

function initPlannerInteractions(key){
  // Attach touch events to unscheduled chips
  setTimeout(()=>{
    const chips=document.querySelectorAll(`.unsched-chip[data-key="${key}"]`);
    chips.forEach(chip=>{
      chip.addEventListener('touchstart',e=>touchChipStart(e,key),{passive:false});
    });
    // Resize handles
    const handles=document.querySelectorAll(`.resize-handle[data-key="${key}"]`);
    handles.forEach(h=>{
      h.addEventListener('mousedown',e=>resizeStart(e,key));
      h.addEventListener('touchstart',e=>resizeTouchStart(e,key),{passive:false});
    });
  },100);
}

function touchChipStart(e,key){
  e.preventDefault();
  const chip=e.currentTarget;
  touchDragTaskId=parseInt(chip.dataset.taskid);
  touchDragKey=key;
  chip.classList.add('dragging-touch');
  const touch=e.touches[0];
  // Create ghost
  touchGhost=document.createElement('div');
  touchGhost.className='touch-ghost';
  const t=S.todos.find(x=>x.id===touchDragTaskId);
  const p=pi(t?t.priority:'');
  touchGhost.style.cssText=`background:${p.bg||'rgba(0,122,255,.1)'};color:${p.color||'#007AFF'};left:${touch.clientX-40}px;top:${touch.clientY-20}px`;
  touchGhost.textContent=t?t.text.slice(0,30)+'…':'Task';
  document.body.appendChild(touchGhost);
  document.addEventListener('touchmove',touchChipMove,{passive:false});
  document.addEventListener('touchend',touchChipEnd);
}

function touchChipMove(e){
  e.preventDefault();
  const touch=e.touches[0];
  if(touchGhost){touchGhost.style.left=`${touch.clientX-40}px`;touchGhost.style.top=`${touch.clientY-20}px`;}
  // Highlight drop zones under finger
  document.querySelectorAll('.drop-zone-abs').forEach(dz=>dz.classList.remove('highlight'));
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  const dz=el?.closest('.drop-zone-abs');
  if(dz)dz.classList.add('highlight');
}

function touchChipEnd(e){
  document.removeEventListener('touchmove',touchChipMove);
  document.removeEventListener('touchend',touchChipEnd);
  if(touchGhost){touchGhost.remove();touchGhost=null;}
  document.querySelectorAll('.unsched-chip').forEach(c=>c.classList.remove('dragging-touch'));
  document.querySelectorAll('.drop-zone-abs').forEach(dz=>dz.classList.remove('highlight'));
  if(!e.changedTouches.length)return;
  const touch=e.changedTouches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  const dz=el?.closest('.drop-zone-abs');
  if(dz&&touchDragTaskId){
    const startMins=parseInt(dz.dataset.startmins);
    const key=dz.dataset.key;
    const t=S.todos.find(x=>x.id===touchDragTaskId);if(!t)return;
    const items=getPlannerItems(key).filter(i=>i.taskId!==touchDragTaskId);
    items.push({taskId:touchDragTaskId,startMins,durationMins:Math.min(t.mins>=999?60:t.mins,120)});
    savePlannerItems(key,items);
    touchDragTaskId=null;touchDragKey=null;renderDayPanel(key);
  }else{touchDragTaskId=null;touchDragKey=null;}
}

// ── Resize ──────────────────────────────────────────────────
let resizeData=null;
function resizeStart(e,key){
  e.preventDefault();
  const taskId=parseInt(e.currentTarget.dataset.taskid);
  resizeData={key,taskId,startY:e.clientY};
  document.addEventListener('mousemove',resizeMove);
  document.addEventListener('mouseup',resizeEnd);
}
function resizeTouchStart(e,key){
  e.preventDefault();
  const taskId=parseInt(e.currentTarget.dataset.taskid);
  const touch=e.touches[0];
  resizeData={key,taskId,startY:touch.clientY};
  document.addEventListener('touchmove',resizeTouchMove,{passive:false});
  document.addEventListener('touchend',resizeTouchEnd);
}
function resizeMove(e){if(!resizeData)return;doResize(e.clientY);}
function resizeTouchMove(e){e.preventDefault();if(!resizeData||!e.touches.length)return;doResize(e.touches[0].clientY);}
function doResize(clientY){
  const {key,taskId,startY}=resizeData;
  const dy=clientY-startY;
  const addedMins=Math.round(dy/PX_PER_MIN/5)*5;
  const items=getPlannerItems(key);
  const item=items.find(i=>i.taskId===taskId);if(!item)return;
  const el=document.getElementById('tb_'+taskId);if(!el)return;
  const t=S.todos.find(x=>x.id===taskId);
  const newDur=Math.max(15,Math.min((t?t.mins:60)+addedMins,480));
  el.style.height=`${newDur*PX_PER_MIN}px`;
  el.querySelector('.task-block-time').textContent=`${minsToTimeStr(item.startMins)} · ${ft(newDur)}`;
}
function resizeEnd(e){
  document.removeEventListener('mousemove',resizeMove);document.removeEventListener('mouseup',resizeEnd);
  if(!resizeData)return;
  const {key,taskId,startY}=resizeData;
  const dy=e.clientY-startY;const addedMins=Math.round(dy/PX_PER_MIN/5)*5;
  const items=getPlannerItems(key);const item=items.find(i=>i.taskId===taskId);
  const t=S.todos.find(x=>x.id===taskId);
  if(item&&t)item.durationMins=Math.max(15,Math.min(t.mins+addedMins,480));
  savePlannerItems(key,items);resizeData=null;renderDayPanel(key);
}
function resizeTouchEnd(e){
  document.removeEventListener('touchmove',resizeTouchMove);document.removeEventListener('touchend',resizeTouchEnd);
  if(!resizeData||!e.changedTouches.length)return;
  const {key,taskId,startY}=resizeData;
  const dy=e.changedTouches[0].clientY-startY;const addedMins=Math.round(dy/PX_PER_MIN/5)*5;
  const items=getPlannerItems(key);const item=items.find(i=>i.taskId===taskId);
  const t=S.todos.find(x=>x.id===taskId);
  if(item&&t)item.durationMins=Math.max(15,Math.min(t.mins+addedMins,480));
  savePlannerItems(key,items);resizeData=null;renderDayPanel(key);
}

      </button>

    </div>

}

function updateNoteFromEditor(id){
  const el=document.getElementById(`note-editor-${id}`);if(!el)return;
  const n=S.notes.find(x=>x.id===id);if(!n)return;
  n.bodyHtml=el.innerHTML;
  // Also keep plain text for AI extraction
  n.body=el.innerText||el.textContent||'';
  save();
  const btn=document.getElementById(`extract-btn-${id}`);
  if(btn)btn.disabled=n.body.trim().length<10;
}

function deleteNote(id){
  if(!confirm('Delete this note?'))return;
  S.notes=S.notes.filter(n=>n.id!==id);save();closeNoteDetail();
}

function updateNote(id,field,value){
  const n=S.notes.find(x=>x.id===id);if(!n)return;
  n[field]=value;save();
  if(field==='body'){const btn=document.querySelector('.extract-btn');if(btn)btn.disabled=value.trim().length<10;}
}

// ── API Key helpers ──────────────────────────────────────────
const API_KEY_SK = 'life-triage-anthropic-key';
function getApiKey(){ return localStorage.getItem(API_KEY_SK)||''; }
function setApiKey(k){ if(k) localStorage.setItem(API_KEY_SK,k); else localStorage.removeItem(API_KEY_SK); }
function promptApiKey(){
  const current=getApiKey();
  const k=prompt(
    'Enter your Anthropic API key.\n\nGet one at console.anthropic.com → API Keys.\nIt starts with "sk-ant-…" and is stored only in your browser.',
    current||''
  );
  if(k===null)return false; // cancelled
  const trimmed=k.trim();
  setApiKey(trimmed);
  return !!trimmed;
}

async function extractTasks(noteId){
  const n=S.notes.find(x=>x.id===noteId);if(!n||!n.body)return;
  // Check for API key first
  let apiKey=getApiKey();
  if(!apiKey){
    const res=document.getElementById('extract-results');
    if(res)res.innerHTML=`<div style="background:rgba(0,122,255,.08);border:1px solid rgba(0,122,255,.25);border-radius:12px;padding:14px;font-size:14px;color:var(--blue)">
      <strong>API key required</strong><br><br>
      To extract tasks with AI, add your Anthropic API key. It's stored only in this browser — never sent anywhere except directly to Anthropic.<br><br>
      <button onclick="if(promptApiKey())extractTasks(${noteId})" style="padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">Set API Key &amp; Continue</button>
    </div>`;
    return;
  }
  const btn=document.querySelector('.extract-btn');
  if(btn){btn.disabled=true;btn.textContent='✦ Extracting…';}
  const res=document.getElementById('extract-results');
  if(res)res.innerHTML=`<div style="text-align:center;padding:20px;color:var(--label3);font-size:14px">Analyzing your note…</div>`;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-5",
        max_tokens:2000,
        system:`You are a personal assistant helping extract actionable tasks from meeting notes. Return ONLY valid JSON — an array of task objects. No preamble, no markdown, no backticks. Each task object must have exactly these fields:
- text: string (action item)
- cat: one of ["Finance & Legal","Cars","Home & Maintenance","Organization & Admin","Kids","Church","Personal Health & Growth","Social & Family","Professional & AI"]
- priority: one of ["immediate","next-month","long-term"]
- delegate: one of ["matt","julia","the-kids","cleaner","child-minder","exec-assistant","handyman","landscaper"]
- mins: integer (estimated personal time in minutes)
- notes: string (short context max 80 chars)
Context: Matt is a busy professional, 50hr/week job, wife Julia, kids, church responsibilities. Delegate research/scheduling/paperwork to exec-assistant. Default matt for judgment/relationship tasks. Extract 3-12 genuine action items only.`,
        messages:[{role:"user",content:`Extract tasks from these notes:\n\n${n.body}`}]
      })
    });
    if(!resp.ok){
      const errData=await resp.json().catch(()=>({}));
      throw new Error(errData.error?.message||`HTTP ${resp.status}`);
    }
    const data=await resp.json();
    const rawText=data.content?.find(b=>b.type==="text")?.text||"[]";
    const clean=rawText.replace(/```json|```/g,'').trim();
    const tasks=JSON.parse(clean);
    if(!Array.isArray(tasks)||!tasks.length)throw new Error("No tasks found in response");
    window._extractedTasks=tasks.map((t,i)=>({...t,_sel:true,_idx:i}));
    renderExtracted();
  }catch(err){
    const msg=err.message||'Unknown error';
    const isKeyErr=msg.toLowerCase().includes('api key')||msg.toLowerCase().includes('authentication')||msg.includes('401');
    if(res)res.innerHTML=`<div style="background:#fef2f2;border-radius:12px;padding:14px;font-size:14px;color:#dc2626">
      <strong>Could not extract tasks.</strong> ${esc(msg)}<br><br>
      ${isKeyErr
        ?`<button onclick="if(promptApiKey())extractTasks(${noteId})" style="padding:8px 16px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Update API Key</button>`
        :`<span style="font-size:12px;color:#9ca3af">Check that your API key is valid and has credits at console.anthropic.com.</span>`
      }
    </div>`;
    if(btn){btn.disabled=false;btn.textContent='✦ Extract Tasks with AI';}
  }
}

function renderExtracted(){
  const tasks=window._extractedTasks||[];
  const res=document.getElementById('extract-results');if(!res)return;
  const btn=document.querySelector('.extract-btn');if(btn){btn.disabled=false;btn.textContent='✦ Extract Tasks with AI';}
  if(!tasks.length)return;
  let html=`<div style="font-size:13px;font-weight:700;color:var(--label);margin-bottom:10px">✦ ${tasks.length} tasks found — review and select:</div>`;
  tasks.forEach((t,i)=>{
    const p=pi(t.priority),cc=CC[t.cat]||'#007AFF';
    html+=`<div class="extracted-task-item">
      <button class="ext-check${t._sel?' on':''}" onclick="toggleExtracted(${i})"></button>
      <div class="ext-text">
        <div style="font-weight:500;margin-bottom:4px">${esc(t.text)}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:600;color:#fff;background:${cc};border-radius:5px;padding:2px 7px">${esc(t.cat)}</span>
          <span style="font-size:10px;font-weight:600;color:${p.color};background:${p.bg};border-radius:5px;padding:2px 7px">${p.label}</span>
          <span style="font-size:10px;color:var(--label3)">→ ${dl(t.delegate)}</span>
        </div>
      </div>
    </div>`;
  });
  const sel=tasks.filter(t=>t._sel).length;
  html+=`<button onclick="addExtractedTasks()" style="width:100%;padding:14px;background:${sel?'var(--green)':'var(--fill)'};color:${sel?'#fff':'var(--label3)'};border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:${sel?'pointer':'default'};margin-top:8px;transition:all .15s">${sel?`Add ${sel} Selected Task${sel>1?'s':''}`:'Select tasks to add'}</button>`;
  res.innerHTML=html;
}

function toggleExtracted(i){if(window._extractedTasks)window._extractedTasks[i]._sel=!window._extractedTasks[i]._sel;renderExtracted();}

function addExtractedTasks(){
  const tasks=(window._extractedTasks||[]).filter(t=>t._sel);
  tasks.forEach(t=>{S.todos.push({id:S.nextId++,cat:t.cat,text:t.text,priority:t.priority,delegate:t.delegate,mins:t.mins||30,notes:t.notes||"",pinned:false,done:false,qorder:S.todos.length});});
  window._extractedTasks=[];save();
  const res=document.getElementById('extract-results');
  if(res)res.innerHTML=`<div style="background:rgba(52,199,89,.1);border-radius:12px;padding:14px;font-size:15px;color:var(--green);font-weight:600;text-align:center">✓ ${tasks.length} task${tasks.length>1?'s':''} added to your list</div>`;
  renderHeader();renderTabbar();
}

let sheetState = { key:null, startMins:0, endMins:0, mode:'task', recur:'none' };

const RECUR_OPTIONS = [
  { key:'none',    label:'Once' },
  { key:'daily',   label:'Daily' },
  { key:'weekdays',label:'Weekdays' },
  { key:'weekly',  label:'Weekly' },
  { key:'monthly', label:'Monthly' },
];

function openEventEdit(key, evtId){
  const evt=(S.plannerData[key]&&S.plannerData[key].events||[]).find(e=>e.id===evtId);
  if(!evt)return;
  sheetState={ key, startMins:evt.startMins, endMins:evt.startMins+evt.durationMins, mode:'event', recur:'none', editEvtId:evtId };
  sheetColor=evt.color||'#007AFF';
  document.getElementById('sheet-title').textContent='Edit Event';
  renderPlannerSheet(evt);
  document.getElementById('planner-sheet').classList.add('open');
}

function openPlannerSheet(key, startMins, endMins){
  sheetState = { key, startMins, endMins, mode:'task', recur:'none', editEvtId:null };
  sheetColor='#007AFF';
  document.getElementById('sheet-title').textContent = `Add at ${minsToTimeStr(startMins)}`;
  renderPlannerSheet(null);
  document.getElementById('planner-sheet').classList.add('open');
  setTimeout(()=>{ document.getElementById('sheet-name-input')?.focus(); }, 320);
}

function closePlannerSheet(){
  document.getElementById('planner-sheet').classList.remove('open');
}

function setSheetMode(mode){
  sheetState.mode = mode;
  renderPlannerSheet(null);
  setTimeout(()=>{ document.getElementById('sheet-name-input')?.focus(); }, 50);
}

function setSheetRecur(r){
  sheetState.recur = r;
  // Re-render just the recur chips
  document.querySelectorAll('.recur-chip').forEach(el=>{
    el.classList.toggle('sel', el.dataset.recur===r);
  });
}

function renderPlannerSheet(prefill){
  const {startMins, endMins, mode, recur} = sheetState;
  const gapMins = endMins - startMins;
  const defaultDur = prefill ? prefill.durationMins : Math.min(Math.max(gapMins, 30), 60);
  const isTask = mode === 'task';
  const isEdit = !!sheetState.editEvtId;

  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-segment">
      <button class="seg-btn${isTask?' active':''}" onclick="setSheetMode('task')" ${isEdit?'disabled style="opacity:.4"':''}>📋 Task</button>
      <button class="seg-btn${!isTask?' active':''}" onclick="setSheetMode('event')" ${isEdit?'disabled style="opacity:.4"':''}>📅 Event</button>
    </div>
    <div class="sheet-field">
      <label>${isTask ? 'Task description' : 'Event title'}</label>
      <input class="sheet-input" id="sheet-name-input" placeholder="${isTask ? 'e.g. Call contractor about deck' : 'e.g. Team standup'}" value="${prefill?esc(prefill.title||''):''}" autocomplete="off">
    </div>
    <div class="sheet-row">
      <div class="sheet-field">
        <label>Start time</label>
        <input class="sheet-input" id="sheet-start-input" type="time" value="${minsToTimeInput(prefill?prefill.startMins:startMins)}">
      </div>
      <div class="sheet-field">
        <label>Duration</label>
        <select class="sheet-select" id="sheet-dur-input">
          ${[30,60,90,120,180,240,300,360,420,480,540,600].map(m=>`<option value="${m}"${m===defaultDur?' selected':''}>${ft(m)}</option>`).join('')}
        </select>
      </div>
    </div>
    ${isTask ? `
    <div class="sheet-row">
      <div class="sheet-field">
        <label>Category</label>
        <select class="sheet-select" id="sheet-cat-input">
          ${CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div class="sheet-field">
        <label>Assign to</label>
        <select class="sheet-select" id="sheet-del-input">
          ${DELEGATES.map(d=>`<option value="${d.key}">${d.label}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="sheet-field">
      <label>Priority</label>
      <select class="sheet-select" id="sheet-pri-input">
        ${PRIORITIES.map(p=>`<option value="${p.key}">${p.label}</option>`).join('')}
      </select>
    </div>
    ` : `
    <div class="sheet-field">
      <label>Color</label>
      <div style="display:flex;gap:8px">
        ${['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#FF2D55','#30B0C7'].map(c=>
          `<div data-color="${c}" onclick="selectSheetColor('${c}')" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c===(prefill?prefill.color:sheetColor)?'#fff':'transparent'};transform:${c===(prefill?prefill.color:sheetColor)?'scale(1.15)':'scale(1)'};transition:all .15s" id="sc_${c.slice(1)}"></div>`
        ).join('')}
      </div>
    </div>
    `}
    ${!isEdit ? `
    <div class="sheet-field">
      <label>Repeat</label>
      <div class="recur-chips">
        ${RECUR_OPTIONS.map(r=>`<div class="recur-chip${recur===r.key?' sel':''}" data-recur="${r.key}" onclick="setSheetRecur('${r.key}')">${r.label}</div>`).join('')}
      </div>
    </div>` : ''}
    <button class="sheet-confirm" onclick="confirmPlannerSheet()">
      ${isEdit ? '✓ Save Changes' : isTask ? '+ Add Task to Planner' : '+ Add Event'}
    </button>
    <div style="height:8px"></div>
  `;
  // Init color picker to current color
  selectSheetColor(prefill?prefill.color||'#007AFF':sheetColor);
}

function minsToTimeInput(mins){
  const h=Math.floor(mins/60),m=mins%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function timeInputToMins(val){
  const [h,m]=(val||'00:00').split(':').map(Number);
  return h*60+m;
}

let sheetColor = '#007AFF';
function selectSheetColor(c){
  sheetColor = c;
  document.querySelectorAll('[data-color]').forEach(el=>{
    el.style.borderColor = el.dataset.color === c ? '#fff' : 'transparent';
    el.style.transform = el.dataset.color === c ? 'scale(1.15)' : 'scale(1)';
  });
}

function confirmPlannerSheet(){
  const name = (document.getElementById('sheet-name-input')?.value||'').trim();
  if(!name){ document.getElementById('sheet-name-input')?.focus(); return; }
  const startMins = timeInputToMins(document.getElementById('sheet-start-input')?.value);
  const dur = parseInt(document.getElementById('sheet-dur-input')?.value||'30');
  const {key, mode, recur, editEvtId} = sheetState;

  // Edit existing event
  if(editEvtId){
    const evts=(S.plannerData[key]&&S.plannerData[key].events)||[];
    const evt=evts.find(e=>e.id===editEvtId);
    if(evt){ evt.title=name; evt.startMins=startMins; evt.durationMins=dur; evt.color=sheetColor; }
    save(); closePlannerSheet(); renderDayPanel(key); return;
  }

  if(mode === 'task'){
    const cat = document.getElementById('sheet-cat-input')?.value || CATS[0];
    const delegate = document.getElementById('sheet-del-input')?.value || 'matt';
    const priority = document.getElementById('sheet-pri-input')?.value || 'immediate';
    const newTask = { id:S.nextId++, cat, text:name, priority, delegate, mins:dur,
      notes:'Added from planner', pinned:false, done:false, qorder:S.todos.length };
    S.todos.push(newTask);
    if(!S.calMap[key]) S.calMap[key]=[];
    S.calMap[key].push(newTask.id);
    const items = getPlannerItems(key);
    items.push({ taskId:newTask.id, startMins, durationMins:dur });
    savePlannerItems(key, items);
    addRecurring(key, newTask, startMins, dur, recur);
  } else {
    if(!S.plannerData[key]) S.plannerData[key]={};
    if(!S.plannerData[key].events) S.plannerData[key].events=[];
    const evt = { id:'ev'+Date.now(), title:name, startMins, durationMins:dur, color:sheetColor };
    S.plannerData[key].events.push(evt);
    addRecurringEvent(key, evt, recur);
    save();
  }
  closePlannerSheet();
  renderDayPanel(key);
  renderHeader(); renderTabbar();
}

function addRecurring(baseKey, task, startMins, dur, recur){
  if(recur==='none') return;
  const baseDate = new Date(baseKey+'T12:00:00');
  const dates = getRecurringDates(baseDate, recur, 90); // 90 days forward
  dates.forEach(d=>{
    const k=dk(d);
    if(k===baseKey) return; // already added
    if(!S.calMap[k]) S.calMap[k]=[];
    if(!S.calMap[k].includes(task.id)) S.calMap[k].push(task.id);
    const items=getPlannerItems(k);
    if(!items.find(i=>i.taskId===task.id)) items.push({taskId:task.id,startMins,durationMins:dur});
    savePlannerItems(k,items);
  });
}

function addRecurringEvent(baseKey, evt, recur){
  if(recur==='none') return;
  const baseDate = new Date(baseKey+'T12:00:00');
  const dates = getRecurringDates(baseDate, recur, 90);
  dates.forEach(d=>{
    const k=dk(d);
    if(k===baseKey) return;
    if(!S.plannerData[k]) S.plannerData[k]={};
    if(!S.plannerData[k].events) S.plannerData[k].events=[];
    S.plannerData[k].events.push({...evt, id:'ev'+Date.now()+Math.random()});
  });
  save();
}

function getRecurringDates(baseDate, recur, days){
  const dates=[];
  for(let i=1;i<=days;i++){
    const d=new Date(baseDate);
    d.setDate(baseDate.getDate()+i);
    const dow=d.getDay(); // 0=Sun,6=Sat
    if(recur==='daily') dates.push(d);
    else if(recur==='weekdays' && dow>=1 && dow<=5) dates.push(d);
    else if(recur==='weekly' && d.getDay()===baseDate.getDay()) dates.push(d);
    else if(recur==='monthly' && d.getDate()===baseDate.getDate()) dates.push(d);
  }
  return dates;
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
loadState();
render();
</script>
