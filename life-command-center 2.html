<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:   #0f172a;
    --navy2:  #1e293b;
    --navy3:  #334155;
    --slate:  #64748b;
    --muted:  #94a3b8;
    --border: #e2e8f0;
    --bg:     #f8f7f4;
    --card:   #ffffff;
    --red:    #dc2626;
    --amber:  #d97706;
    --gray:   #6b7280;
    --green:  #16a34a;
    --blue:   #2563eb;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bot: env(safe-area-inset-bottom, 20px);
  }
  html, body { height: 100%; overflow: hidden; background: var(--navy); }
  body { font-family: 'DM Sans', sans-serif; color: #1a1a2e; -webkit-font-smoothing: antialiased; }
  h1, h2, .serif { font-family: 'DM Serif Display', serif; }
  button { font-family: 'DM Sans', sans-serif; }
  select { font-family: 'DM Sans', sans-serif; }
  textarea { font-family: 'DM Sans', sans-serif; }

  /* ── Layout shell ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ── Header ── */
  #header {
    background: var(--navy);
    color: #f8fafc;
    padding: calc(var(--safe-top) + 12px) 20px 0;
    flex-shrink: 0;
    user-select: none;
  }
  #header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  #header-title { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.3px; line-height: 1; }
  #header-sub { font-size: 12px; color: var(--slate); margin-top: 3px; }
  #add-btn-header {
    width: 44px; height: 44px; border-radius: 50%; background: var(--blue);
    border: none; color: #fff; font-size: 26px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(37,99,235,0.4); flex-shrink: 0;
  }

  /* Stat pills */
  #stats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  #stats::-webkit-scrollbar { display: none; }
  .stat-pill { background: var(--navy2); border-radius: 20px; padding: 5px 12px; white-space: nowrap; flex-shrink: 0; }
  .stat-pill .val { font-weight: 700; font-size: 15px; }
  .stat-pill .lbl { font-size: 11px; color: var(--slate); margin-left: 4px; }

  /* Tab bar */
  #tabbar { display: flex; overflow-x: auto; scrollbar-width: none; padding-top: 4px; }
  #tabbar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 10px 16px; border: none; background: transparent; color: var(--slate);
    font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    border-radius: 10px 10px 0 0; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--bg); color: var(--navy); font-weight: 700; }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: #f59e0b; color: #fff; border-radius: 10px;
    padding: 1px 6px; font-size: 10px; margin-left: 4px; font-weight: 700;
  }

  /* ── Content ── */
  #content { flex: 1; overflow-y: auto; background: var(--bg); padding: 16px 16px calc(var(--safe-bot) + 20px); -webkit-overflow-scrolling: touch; }

  /* ── Cards ── */
  .task-card {
    background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    border: 1px solid var(--border); border-left: 4px solid #e5e7eb;
    transition: opacity 0.2s;
  }
  .task-card.done { opacity: 0.55; background: #f0fdf4; border-left-color: var(--green) !important; }
  .task-card.pinned { border-color: #fbbf24; box-shadow: 0 0 0 2px #fbbf2430; }
  .task-row { display: flex; gap: 10px; align-items: flex-start; }
  .check-btn {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px; border: 2px solid #d1d5db;
    background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; margin-top: 1px; transition: all 0.15s;
  }
  .check-btn.checked { background: var(--green); border-color: var(--green); }
  .task-text { flex: 1; font-size: 14px; line-height: 1.5; color: #111827; }
  .task-text.done-text { text-decoration: line-through; color: var(--slate); }
  .cat-pill { font-size: 10px; color: #fff; border-radius: 5px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #d1d5db; flex-shrink: 0; padding: 0 2px; line-height: 1; }
  .star-btn.starred { color: #f59e0b; }
  .task-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .meta-select {
    border: none; border-radius: 6px; padding: 3px 8px; font-size: 11px;
    font-weight: 600; cursor: pointer; outline: none; background: transparent;
  }
  .time-pill { font-size: 11px; background: #f1f5f9; color: #475569; border-radius: 6px; padding: 3px 8px; }
  .note-text { font-size: 11px; color: var(--muted); font-style: italic; }

  /* ── Collapsible group ── */
  .group-header {
    width: 100%; display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid #e5e7eb; border-radius: 12px; cursor: pointer;
    text-align: left; margin-bottom: 6px; transition: border-radius 0.1s;
  }
  .group-header.open { border-radius: 12px 12px 0 0; margin-bottom: 0; }
  .group-title { font-weight: 700; font-size: 14px; flex: 1; }
  .group-meta { font-size: 12px; color: var(--slate); }
  .group-chevron { font-size: 11px; color: var(--muted); }
  .group-body { background: #fafafa; border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; padding: 10px 10px 4px; margin-bottom: 10px; }

  /* ── Filters bar ── */
  .filters { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px;
    font-size: 13px; background: var(--card); flex-shrink: 0; outline: none; color: #374151;
  }
  .search-input {
    flex: 1; min-width: 140px; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; background: var(--card); outline: none; color: #111827;
  }

  /* ── Calendar ── */
  .cal-pool { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid var(--border); }
  .cal-pool-label { font-size: 11px; font-weight: 700; color: var(--slate); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .cal-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .cal-chip {
    padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer;
    border: 2px solid transparent; font-weight: 500; max-width: 220px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: all 0.15s; user-select: none;
  }
  .cal-chip.tapping { border-color: #3b82f6 !important; background: #dbeafe !important; color: #1d4ed8 !important; font-weight: 700; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .week-day {
    background: var(--card); border-radius: 10px; padding: 8px 6px; border: 2px solid var(--border);
    min-height: 90px; transition: border-color 0.15s;
  }
  .week-day.today { background: #eff6ff; border-color: #3b82f6; }
  .week-day.tap-target { border-color: #93c5fd; cursor: pointer; background: #f0f9ff; }
  .week-day-name { font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 2px; }
  .week-day-date { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
  .cal-task-chip {
    font-size: 10px; border-radius: 5px; padding: 2px 5px; margin-bottom: 3px;
    line-height: 1.3; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .month-day-hdr { font-size: 10px; font-weight: 700; color: var(--muted); text-align: center; padding: 3px 0; }
  .month-day {
    background: var(--card); border-radius: 6px; padding: 4px; min-height: 56px;
    border: 1px solid var(--border); transition: border-color 0.15s;
  }
  .month-day.out-month { opacity: 0.35; background: #f8f8f8; }
  .month-day.today { background: #eff6ff; border-color: #3b82f6; }
  .month-day.tap-target { border-color: #93c5fd; cursor: pointer; }
  .month-day-num { font-size: 11px; color: #374151; margin-bottom: 2px; }
  .month-task-bar { font-size: 9px; color: #fff; border-radius: 3px; padding: 1px 4px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .hint-text { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* ── Modal overlay ── */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; flex-direction: column; background: var(--navy);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(var(--safe-top) + 16px) 20px 16px;
    border-bottom: 1px solid var(--navy2);
  }
  .modal-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--slate); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: #f8fafc; margin-top: 2px; }
  .modal-close {
    width: 40px; height: 40px; border-radius: 10px; background: var(--navy2);
    border: none; color: var(--muted); font-size: 20px; cursor: pointer;
  }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
  .modal-footer { padding: 16px 20px calc(var(--safe-bot) + 16px); border-top: 1px solid var(--navy2); background: var(--navy); }

  /* Modal inputs */
  .intake-textarea {
    width: 100%; padding: 14px; border: 1px solid var(--navy3); border-radius: 12px;
    font-size: 16px; background: var(--navy2); color: #f1f5f9;
    resize: none; outline: none; line-height: 1.6;
  }
  .classify-btn {
    width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
    border: none; border-radius: 12px; cursor: pointer; transition: background 0.2s;
  }
  .classify-btn:disabled { background: var(--navy3); color: var(--slate); cursor: default; }
  .classify-btn:not(:disabled) { background: var(--blue); color: #fff; }
  .confirm-btn { width: 100%; padding: 16px; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; background: var(--green); color: #fff; }

  /* Preview cards */
  .preview-section { background: var(--navy2); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .preview-label { font-size: 10px; color: var(--slate); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip-option {
    padding: 8px 12px; border-radius: 10px; border: 2px solid transparent;
    background: var(--navy); color: var(--slate); font-size: 12px; cursor: pointer;
    transition: all 0.12s; font-weight: 500;
  }
  .chip-option.selected { font-weight: 700; }
  .priority-group { display: flex; gap: 8px; }
  .priority-chip { flex: 1; padding: 11px 6px; border-radius: 10px; border: 2px solid transparent; background: var(--navy); color: var(--slate); font-size: 12px; cursor: pointer; font-weight: 500; text-align: center; }
  .priority-chip.selected { font-weight: 700; }
  .classify-header { font-size: 11px; color: #f59e0b; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }

  /* Slider */
  .time-slider { width: 100%; accent-color: var(--blue); }
  .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--slate); margin-top: 4px; }

  /* Empty states */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 16px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* Completed section toggle */
  .completed-toggle { width: 100%; text-align: left; padding: 10px 14px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--green); font-weight: 600; margin-top: 8px; }

  /* iPad split-view hint */
  @media (min-width: 768px) {
    #content { padding: 20px 24px calc(var(--safe-bot) + 20px); }
    .week-grid { gap: 8px; }
    .week-day { min-height: 110px; padding: 10px 8px; }
  }
</style>
</head>

// ── Persistence ───────────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      state.todos  = p.todos  || SEED;
      state.calMap = p.calMap || {};
      state.nextId = Math.max(...state.todos.map(t => t.id)) + 1;
    } else {
      state.todos  = JSON.parse(JSON.stringify(SEED));
      state.nextId = 200;
    }
  } catch { state.todos = JSON.parse(JSON.stringify(SEED)); }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ todos: state.todos, calMap: state.calMap })); } catch {}
}

const fmtTime = m => m >= 999 ? "Ongoing" : m < 60 ? `${m}m` : m % 60 === 0 ? `${m/60}h` : `${Math.floor(m/60)}h ${m%60}m`;
const pInfo   = k => PRIORITIES.find(p => p.key === k) || {};
const dLabel  = k => (DELEGATES.find(d => d.key === k) || {}).label || k;
const totalMins = items => items.filter(t => t.mins < 999).reduce((s,t) => s+t.mins, 0);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getWeekDates() {
  const now = new Date(); const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({length:7},(_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function getMonthDates() {
  const now = new Date(); const year = now.getFullYear(), month = now.getMonth();
  const first = new Date(year,month,1), last = new Date(year,month+1,0);
  const days = [];
  const startPad = (first.getDay()+6)%7;
  for(let i=startPad;i>0;i--){ const d=new Date(first); d.setDate(d.getDate()-i); days.push({date:d,inMonth:false}); }
  for(let i=1;i<=last.getDate();i++) days.push({date:new Date(year,month,i),inMonth:true});
  const endPad = 7-(days.length%7||7);
  for(let i=1;i<=endPad;i++){ const d=new Date(last); d.setDate(last.getDate()+i); days.push({date:d,inMonth:false}); }
  return days;
}
const dateKey = d => d.toISOString().slice(0,10);
const todayKey = dateKey(new Date());
const fmtMD = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});

// ── Render helpers ────────────────────────────────────────────────────────────
function taskCardHTML(t) {
  const p = pInfo(t.priority);
  const cc = CAT_COLORS[t.cat] || "#374151";
  const dc = DEL_COLORS[t.delegate] || "#6b7280";
  return `
    <div class="task-card${t.done?' done':''}${t.pinned?' pinned':''}" style="border-left-color:${t.done?'#16a34a':p.color||'#e5e7eb'}">
      <div class="task-row">
        <button class="check-btn${t.done?' checked':''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</button>
        <span class="task-text${t.done?' done-text':''}">${esc(t.text)}</span>
        <span class="cat-pill" style="background:${cc}">${esc(t.cat)}</span>
        <button class="star-btn${t.pinned?' starred':''}" onclick="togglePin(${t.id})">${t.pinned?'★':'☆'}</button>
      </div>
      <div class="task-meta">
        <select class="meta-select" style="background:${p.color||'#6b7280'}18;color:${p.color||'#6b7280'}" onchange="updateTask(${t.id},'priority',this.value)">
          ${PRIORITIES.map(pr=>`<option value="${pr.key}"${t.priority===pr.key?' selected':''}>${pr.label}</option>`).join('')}
        </select>
        <select class="meta-select" style="background:${dc}18;color:${dc}" onchange="updateTask(${t.id},'delegate',this.value)">
          ${DELEGATES.map(d=>`<option value="${d.key}"${t.delegate===d.key?' selected':''}>${d.label}</option>`).join('')}
        </select>
        <span class="time-pill">⏱ ${fmtTime(t.mins)}</span>
        ${t.notes?`<span class="note-text">${esc(t.notes)}</span>`:''}
      </div>
    </div>`;
}

function collapsibleGroupHTML(title, items, color, openByDefault=false) {
  const id = 'grp-' + title.replace(/\W/g,'_');
  const isOpen = document.getElementById(id+'_open') ? document.getElementById(id+'_open').value==='1' : openByDefault;
  const tm = totalMins(items);
  return `
    <div>
      <button class="group-header${isOpen?' open':''}" style="border-left-color:${color}" onclick="toggleGroup('${id}')">
        <span class="group-title" style="color:${color}">${esc(title)}</span>
        <span class="group-meta">${items.length} · ${fmtTime(tm)}</span>
        <span class="group-chevron" id="${id}_chevron">${isOpen?'▲':'▼'}</span>
      </button>
      <input type="hidden" id="${id}_open" value="${isOpen?'1':'0'}">
      <div id="${id}_body" class="group-body" style="display:${isOpen?'block':'none'}">
        ${items.map(taskCardHTML).join('')}
      </div>
    </div>`;
}

// ── Tab renderers ─────────────────────────────────────────────────────────────
function renderQueue() {
  const pinned = state.todos.filter(t => !t.done && t.pinned);
  const done   = state.todos.filter(t => t.done);
  let html = '';
  if (!pinned.length) {
    html += `<div class="empty-state"><div class="empty-icon">☆</div><div class="empty-title">Priority queue is empty</div><div class="empty-sub">Tap ☆ on any task to queue it for the next few days.</div></div>`;
  } else {
    html += `<div style="margin-bottom:12px;padding:12px 14px;background:#fffbeb;border-radius:12px;border:1px solid #fbbf24;font-size:13px;color:#92400e;">★ Your next few days — ${pinned.length} tasks · ${fmtTime(totalMins(pinned))} estimated</div>`;
    html += pinned.map(taskCardHTML).join('');
  }
  if (done.length) {
    html += `<div style="margin-top:20px;">
      <button class="completed-toggle" onclick="showCompleted=!showCompleted;renderContent()">
        ${showCompleted ? '▲ Hide' : '▼ Show'} Completed (${done.length}) — tap any to restore
      </button>
      ${showCompleted ? `<div style="margin-top:8px;">${done.map(taskCardHTML).join('')}</div>` : ''}
    </div>`;
  }
  return html;
}

    <div style="font-size:12px;color:#6b7280;margin-bottom:10px;">${active.length} tasks · ${fmtTime(totalMins(active))}</div>
    ${active.map(taskCardHTML).join('')}
    ${done.length?`<div style="margin-top:20px;"><button class="completed-toggle" onclick="showCompleted=!showCompleted;renderContent()">${showCompleted?'▲ Hide':'▼ Show'} Completed (${done.length}) — tap any to restore</button>${showCompleted?`<div style="margin-top:8px">${done.map(taskCardHTML).join('')}</div>`:''}</div>`:''}`;
}

function renderByDimension(groups) {
  return groups.map(g => {
    if(!g.items.length) return '';
    return collapsibleGroupHTML(g.title, g.items, g.color, g.open||false);
  }).join('');
}

function renderWeek() {
  const weekDates = getWeekDates();
  const allActive = state.todos.filter(t => !t.done);
  const assignedIds = new Set(Object.values(state.calMap).flat());
  const unscheduled = allActive.filter(t => !assignedIds.has(t.id));
  const isTapping = calTapMode !== null;
  const tappingTask = isTapping ? state.todos.find(t => t.id === calTapMode) : null;

  let html = `<div class="cal-pool">
    <div class="cal-pool-label">Unscheduled${isTapping?` — tap a day to assign "${tappingTask ? tappingTask.text.slice(0,30)+'…' : ''}"`:' — tap to select, then tap a day'}</div>
    <div class="cal-chips">`;
  for(const t of unscheduled) {
    const p = pInfo(t.priority);
    const isTap = calTapMode === t.id;
    html += `<div class="cal-chip${isTap?' tapping':''}" style="background:${isTap?'#dbeafe':p.bg};color:${isTap?'#1d4ed8':p.color};border-color:${isTap?'#3b82f6':p.color+'40'}" onclick="calTap(${t.id})" draggable="true" ondragstart="dragId=${t.id}" ondragend="dragId=null">
      ${esc(t.text.length>36?t.text.slice(0,36)+'…':t.text)}
    </div>`;
  }
  if(!unscheduled.length) html += `<span style="font-size:12px;color:#9ca3af;">All tasks scheduled ✓</span>`;
  html += `</div></div>`;

  html += `<div class="week-grid">`;
  for(let i=0;i<7;i++) {
    const date = weekDates[i];
    const key = dateKey(date);
    const isToday = key === todayKey;
    const assignedIds2 = (state.calMap[key]||[]);
    const assigned = assignedIds2.map(id=>state.todos.find(t=>t.id===id)).filter(Boolean);
    html += `<div class="week-day${isToday?' today':''}${isTapping?' tap-target':''}"
      ondragover="event.preventDefault()" ondrop="dropOnDay('${key}')"
      onclick="tapDay('${key}')">
      <div class="week-day-name">${DAYS[i]}</div>
      <div class="week-day-date">${fmtMD(date)}</div>`;
    for(const t of assigned) {
      const p = pInfo(t.priority);
      html += `<div class="cal-task-chip" style="background:${p.bg};color:${p.color};border:1px solid ${p.color}30" onclick="event.stopPropagation();unassign(${t.id},'${key}')">
        <span>${esc(t.text.slice(0,20))}${t.text.length>20?'…':''}</span>
        <span style="opacity:0.6;margin-left:3px">✕</span>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div><p class="hint-text">Tap a task chip then tap a day. Drag on desktop. Tap calendar items to remove.</p>`;
  return html;
}

function renderMonth() {
  const monthDays = getMonthDates();
  const now = new Date();
  const monthName = now.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const allActive = state.todos.filter(t => !t.done);
  const assignedIds = new Set(Object.values(state.calMap).flat());
  const unscheduled = allActive.filter(t => !assignedIds.has(t.id));
  const isTapping = calTapMode !== null;
  const tappingTask = isTapping ? state.todos.find(t => t.id === calTapMode) : null;

  let html = `<div style="font-family:'DM Serif Display',serif;font-size:20px;color:#111827;margin-bottom:12px;">${monthName}</div>`;
  html += `<div class="cal-pool">
    <div class="cal-pool-label">Unscheduled${isTapping?` — tap a day for "${tappingTask?tappingTask.text.slice(0,25)+'…':''}"`:''}
    </div><div class="cal-chips">`;
  for(const t of unscheduled) {
    const p = pInfo(t.priority); const isTap = calTapMode===t.id;
    html += `<div class="cal-chip${isTap?' tapping':''}" style="background:${isTap?'#dbeafe':p.bg};color:${isTap?'#1d4ed8':p.color};border-color:${isTap?'#3b82f6':p.color+'40'}" onclick="calTap(${t.id})" draggable="true" ondragstart="dragId=${t.id}" ondragend="dragId=null">
      ${esc(t.text.length>28?t.text.slice(0,28)+'…':t.text)}
    </div>`;
  }
  if(!unscheduled.length) html += `<span style="font-size:11px;color:#9ca3af;">All scheduled ✓</span>`;
  html += `</div></div>`;

  html += `<div class="month-grid">`;
  for(const d of DAYS) html += `<div class="month-day-hdr">${d}</div>`;
  for(const {date, inMonth} of monthDays) {
    const key = dateKey(date); const isToday = key===todayKey;
    const assigned = (state.calMap[key]||[]).map(id=>state.todos.find(t=>t.id===id)).filter(Boolean);
    html += `<div class="month-day${!inMonth?' out-month':''}${isToday?' today':''}${isTapping&&inMonth?' tap-target':''}"
      ondragover="event.preventDefault()" ondrop="dropOnDay('${key}')"
      onclick="${inMonth?`tapDay('${key}')`:''}">
      <div class="month-day-num" style="font-weight:${isToday?700:400};color:${isToday?'#1d4ed8':'#374151'}">${date.getDate()}</div>`;
    for(const t of assigned.slice(0,2)) {
      const cc = CAT_COLORS[t.cat]||'#374151';
      html += `<div class="month-task-bar" style="background:${cc}" onclick="event.stopPropagation();unassign(${t.id},'${key}')" title="${esc(t.text)}">${esc(t.text.slice(0,13))}${t.text.length>13?'…':''}</div>`;
    }
    if(assigned.length>2) html += `<div style="font-size:9px;color:#9ca3af;">+${assigned.length-2}</div>`;
    html += `</div>`;
  }
  html += `</div><p class="hint-text">Tap a chip then tap a day. Drag on desktop. Tap bars to remove.</p>`;
  return html;
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderHeader() {
  const active = state.todos.filter(t=>!t.done);
  const done   = state.todos.filter(t=>t.done);
  const pinned = active.filter(t=>t.pinned);
  const myImm  = active.filter(t=>t.priority==="immediate"&&t.delegate==="myself");
  document.getElementById('header-sub').textContent = `${active.length} active · ${done.length} done · ${pinned.length} queued`;
  document.getElementById('stats').innerHTML = [
    {label:"Immediate",val:fmtTime(totalMins(myImm)),color:"#ef4444"},
    {label:"In Queue",val:pinned.length,color:"#f59e0b"},
    {label:"Done",val:done.length,color:"#22c55e"},
    {label:"Delegated",val:active.filter(t=>t.delegate!=="myself").length,color:"#a78bfa"},
  ].map(s=>`<div class="stat-pill"><span class="val" style="color:${s.color}">${s.val}</span><span class="lbl">${s.label}</span></div>`).join('');
}

const TABS = [
  {label:"⚡ Queue"},
  {label:"All"},
  {label:"Category"},
  {label:"Priority"},
  {label:"Delegate"},
  {label:"📅 Week"},
  {label:"🗓 Month"},
];
function renderTabbar() {
  const pinned = state.todos.filter(t=>!t.done&&t.pinned).length;
  document.getElementById('tabbar').innerHTML = TABS.map((t,i)=>`
    <button class="tab-btn${activeTab===i?' active':''}" onclick="switchTab(${i})">
      ${t.label}${i===0&&pinned?`<span class="badge">${pinned}</span>`:''}
    </button>`).join('');
}

function renderContent() {
  const active = state.todos.filter(t=>!t.done);
  let html = '';
  if      (activeTab===0) html = renderQueue();
  else if (activeTab===1) html = renderAll();
  else if (activeTab===2) html = renderByDimension(CATS.map(c=>({title:c,items:active.filter(t=>t.cat===c),color:CAT_COLORS[c]||'#374151'})));
  else if (activeTab===3) html = renderByDimension(PRIORITIES.map(p=>({title:p.label,items:active.filter(t=>t.priority===p.key),color:p.color,open:p.key==="immediate"})));
  else if (activeTab===4) html = renderByDimension(DELEGATES.map(d=>({title:d.label,items:active.filter(t=>t.delegate===d.key),color:DEL_COLORS[d.key]||'#6b7280',open:d.key==="myself"})));
  else if (activeTab===5) html = renderWeek();
  else if (activeTab===6) html = renderMonth();
  document.getElementById('content').innerHTML = html;
}

function render() {
  renderHeader();
  renderTabbar();
  renderContent();
}

// ── Interactions ──────────────────────────────────────────────────────────────
function switchTab(i) { activeTab=i; calTapMode=null; render(); }

function toggleGroup(id) {
  const body = document.getElementById(id+'_body');
  const inp  = document.getElementById(id+'_open');
  const chev = document.getElementById(id+'_chevron');
  const hdr  = body.previousElementSibling;
  if(body.style.display==='none') { body.style.display='block'; inp.value='1'; chev.textContent='▲'; hdr.classList.add('open'); }
  else { body.style.display='none'; inp.value='0'; chev.textContent='▼'; hdr.classList.remove('open'); }
}

function updateTask(id, field, value) {
  const t = state.todos.find(t=>t.id===id);
  if(t) { t[field]=value; saveState(); renderHeader(); renderTabbar(); }
}

function toggleDone(id) {
  const t = state.todos.find(t=>t.id===id);
  if(t) { t.done=!t.done; saveState(); render(); }
}

function togglePin(id) {
  const t = state.todos.find(t=>t.id===id);
  if(t) { t.pinned=!t.pinned; saveState(); render(); }
}

function calTap(id) {
  calTapMode = calTapMode===id ? null : id;
  renderContent();
}

function tapDay(key) {
  if(calTapMode===null) return;
  assignToDay(calTapMode, key);
  calTapMode=null;
  renderContent();
}

function dropOnDay(key) {
  if(dragId) { assignToDay(dragId, key); dragId=null; renderContent(); }
}

function assignToDay(taskId, key) {
  Object.keys(state.calMap).forEach(k=>{ state.calMap[k]=(state.calMap[k]||[]).filter(id=>id!==taskId); });
  if(!state.calMap[key]) state.calMap[key]=[];
  state.calMap[key].push(taskId);
  saveState();
}

function unassign(taskId, key) {
  state.calMap[key]=(state.calMap[key]||[]).filter(id=>id!==taskId);
  saveState(); renderContent();
}

// ── Add Task Modal ────────────────────────────────────────────────────────────
function openAddModal() {
  modalPreview=null;
  document.getElementById('modal-overlay').style.display='flex';
  renderModalStep1();
}

function closeAddModal() {
  document.getElementById('modal-overlay').style.display='none';
  modalPreview=null;
}

function renderModalStep1() {
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:14px;color:#64748b;margin-bottom:18px;line-height:1.6;">Describe your task naturally. It'll be sorted into the right category, priority, and owner automatically. Adjust anything before confirming.</p>
    <textarea class="intake-textarea" id="task-input" rows="5" placeholder="e.g. Schedule dentist checkups for the kids before school starts…" autofocus></textarea>
    <div id="classify-error" style="margin-top:10px;display:none;background:#fef2f2;border-radius:8px;padding:10px 14px;font-size:13px;color:#dc2626;"></div>`;
  document.getElementById('modal-footer').innerHTML = `<button class="classify-btn" id="classify-btn" onclick="doClassify()">✦ Classify</button>`;
  setTimeout(()=>{ const ta=document.getElementById('task-input'); if(ta) ta.focus(); },100);
}

function doClassify() {
  const input = (document.getElementById('task-input')||{}).value||'';
  if(!input.trim()) return;
  modalPreview = { ...smartClassify(input.trim()), text: input.trim() };
  renderModalStep2();
}

function renderModalStep2() {
  const p = modalPreview;
  const pp = pInfo(p.priority);
  document.getElementById('modal-body').innerHTML = `
    <div class="preview-section" style="margin-bottom:16px;">
      <div class="preview-label">Your task</div>
      <div style="font-size:14px;color:#f1f5f9;line-height:1.5;">${esc(p.text)}</div>
    </div>
    <div class="classify-header">✦ Adjust Before Confirming</div>

    <div class="preview-section">
      <div class="preview-label">Category</div>
      <div class="chip-group">
        ${CATS.map(c=>`<button class="chip-option${p.cat===c?' selected':''}" style="${p.cat===c?`border-color:${CAT_COLORS[c]};background:${CAT_COLORS[c]}22;color:${CAT_COLORS[c]}`:''}" onclick="previewUpdate('cat','${c}');renderModalStep2()">${esc(c)}</button>`).join('')}
      </div>
    </div>

    <div class="preview-section" style="margin-top:10px;">
      <div class="preview-label">Priority</div>
      <div class="priority-group">
        ${PRIORITIES.map(pr=>`<button class="priority-chip${p.priority===pr.key?' selected':''}" style="${p.priority===pr.key?`border-color:${pr.color};background:${pr.color}22;color:${pr.color}`:''}" onclick="previewUpdate('priority','${pr.key}');renderModalStep2()">${pr.key==='immediate'?'🔴 Immediate':pr.key==='next-month'?'🟡 Next Month':'⚪ Long Term'}</button>`).join('')}
      </div>
    </div>

    <div class="preview-section" style="margin-top:10px;">
      <div class="preview-label">Assign to</div>
      <div class="chip-group">
        ${DELEGATES.map(d=>`<button class="chip-option${p.delegate===d.key?' selected':''}" style="${p.delegate===d.key?`border-color:${DEL_COLORS[d.key]};background:${DEL_COLORS[d.key]}22;color:${DEL_COLORS[d.key]}`:''}" onclick="previewUpdate('delegate','${d.key}');renderModalStep2()">${d.label}</button>`).join('')}
      </div>
    </div>

    <div class="preview-section" style="margin-top:10px;">
      <div class="preview-label">Your time — <strong style="color:#f1f5f9">${fmtTime(p.mins>=999?300:p.mins)}</strong></div>
      <input type="range" class="time-slider" min="5" max="300" step="5" value="${p.mins>=999?300:p.mins}" oninput="previewUpdate('mins',parseInt(this.value));document.getElementById('time-lbl').textContent=fmtTime(parseInt(this.value))">
      <div class="slider-labels"><span>5m</span><span>1h</span><span>2h</span><span>3h</span><span>5h</span></div>
    </div>

    <button onclick="modalPreview=null;renderModalStep1()" style="background:none;border:none;color:#475569;font-size:13px;cursor:pointer;margin-top:12px;text-decoration:underline;">← Start over</button>`;

  document.getElementById('modal-footer').innerHTML = `<button class="confirm-btn" onclick="confirmAdd()">✓ Add to List</button>`;
}

function previewUpdate(field, value) { if(modalPreview) modalPreview[field]=field==='mins'?parseInt(value):value; }

function confirmAdd() {
  if(!modalPreview) return;
  state.todos.push({ ...modalPreview, id: state.nextId++, pinned:false, done:false });
  saveState();
  closeAddModal();
  render();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadState();
render();
</script>

<script>
// Detect if running in iframe (Claude sidebar) and show fullscreen prompt
(function() {
  try {
    if (window.self !== window.top) {
      // We're in an iframe
      document.getElementById('fullscreen-banner').classList.add('show');
    } else {
      // Standalone — show app normally
      document.getElementById('app').style.display = 'flex';
    }
  } catch(e) {
    // Cross-origin check blocked — assume iframe
    document.getElementById('fullscreen-banner').classList.add('show');
  }
})();
</script>
